<!DOCTYPE html>
<html>
<head>
  <title>React Calculator</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script> <!-- React library -->
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script> <!-- ReactDOM -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script> <!-- Babel for JSX -->

  <style>
    body { font-family: Arial; background: #f2f2f2; } /* Page styling */
    .box { width: 300px; margin: 100px auto; padding: 20px; background: white; text-align: center; border-radius: 10px; } /* Box model */
    input { margin: 10px; padding: 8px; width: 80%; } /* Input styling */
    button { margin: 5px; padding: 10px; width: 40%; background: blue; color: white; border: none; } /* Button styling */
    h2 { color: green; } /* Result color */
  </style>
</head>

<body>
  <div id="root"></div> <!-- Root element -->

  <script type="text/babel">
    
    // Functional component
    const Calculator = () => {

      const [num1, setNum1] = React.useState(""); // State for first input
      const [num2, setNum2] = React.useState(""); // State for second input
      const [result, setResult] = React.useState(0); // State for result

      // Addition function
      const add = () => {
        setResult(Number(num1) + Number(num2)); // Type conversion using Number()
      };

      // Subtraction function
      const sub = () => {
        setResult(Number(num1) - Number(num2));
      };

      return (
        <div className="box"> {/* JSX with className */}
          
          <h1>Basic Calculator</h1>

          <input 
            type="number" 
            value={num1} 
            onChange={(e) => setNum1(e.target.value)} /* Controlled component */
            placeholder="Enter first number"
          />

          <input 
            type="number" 
            value={num2} 
            onChange={(e) => setNum2(e.target.value)} 
            placeholder="Enter second number"
          />

          <div>
            <button onClick={add}>Add</button> {/* Event handling */}
            <button onClick={sub}>Subtract</button>
          </div>

          <h2>Result: {result}</h2>

          <p>
            REG NO: 24BCE2038 <br/>
            NAME: GURUPAVAN KUMAR
          </p>

        </div>
      );
    };

    // Render component
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<Calculator />);
  
  </script>
</body>
</html>
