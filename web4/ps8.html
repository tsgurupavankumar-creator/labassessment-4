<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"> <!-- Character encoding -->
  <title>React Country Explorer</title> <!-- Page title -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script> <!-- React -->
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script> <!-- ReactDOM -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script> <!-- Babel -->

  <style>
    body { font-family: Arial; background: #eef2f3; margin: 0; } /* Page styling */
    .header { background: #0984e3; color: white; padding: 20px; text-align: center; } /* Header */
    .container { width: 90%; margin: 20px auto; text-align: center; } /* Container */
    input { padding: 10px; width: 60%; border-radius: 5px; border: 1px solid #ccc; } /* Input */
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-top: 20px; } /* Grid */
    .card { background: white; padding: 15px; border-radius: 10px; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); } /* Card */
    img { width: 100%; height: 120px; object-fit: cover; } /* Flag image */
  </style>
</head>

<body>
  <div id="root"></div> <!-- Root -->

  <script type="text/babel">

    const fetchCountries = async (name) => { // Utility function
      try {
        const res = await fetch(`https://restcountries.com/v3.1/name/${name}`); // API call
        const data = await res.json(); // Convert JSON
        return Array.isArray(data) ? data : []; // Return array
      } catch {
        return []; // Handle error
      }
    };

    const Header = () => ( // Header component
      <div className="header">
        <h1>🌍 Country Explorer</h1>
      </div>
    );

    const Search = ({ query, setQuery }) => ( // Search component
      <input 
        value={query} 
        onChange={(e) => setQuery(e.target.value)} 
        placeholder="Search country..." 
      /> /* Controlled input */
    );

    const CountryCard = ({ c }) => ( // Country card
      <div className="card">
        <img src={c.flags?.png} alt="flag" /> {/* Flag */}
        <h3>{c.name?.common}</h3> {/* Name */}
        <p>Capital: {c.capital?.[0] || "N/A"}</p> {/* Capital */}
        <p>Population: {c.population}</p> {/* Population */}
        <p>Region: {c.region}</p> {/* Region */}
      </div>
    );

    const CountryList = ({ countries }) => ( // List component
      <div className="grid">
        {countries.map((c, i) => <CountryCard key={i} c={c} />)} {/* Map countries */}
      </div>
    );

    const App = () => { // Main component

      const [query, setQuery] = React.useState(""); // Search state
      const [countries, setCountries] = React.useState([]); // Data state

      React.useEffect(() => { // Fetch when query changes
        if (!query.trim()) { setCountries([]); return; } // Empty check
        fetchCountries(query).then(setCountries); // API call
      }, [query]);

      return (
        <div>
          <Header /> {/* Header */}

          <div className="container">
            <Search query={query} setQuery={setQuery} /> {/* Search */}
            <CountryList countries={countries} /> {/* Display */}

            <p>
              REG NO: 24BCE2038 <br/>
              NAME: GURUPAVAN KUMAR
            </p>
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById("root")); // Root
    root.render(<App />); // Render

  </script>
</body>
</html>
