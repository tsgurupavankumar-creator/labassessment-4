<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>React Weather Dashboard</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { font-family: 'Segoe UI'; background: #74ebd5; margin: 0; }
    .header { background: #2f80ed; color: white; padding: 20px; text-align: center; }
    .container { width: 350px; margin: 30px auto; background: white; padding: 25px; border-radius: 12px; text-align: center; }
    input { padding: 10px; width: 65%; border-radius: 5px; border: 1px solid #ddd; }
    button { padding: 10px; margin-left: 5px; background: #27ae60; color: white; border: none; border-radius: 5px; cursor: pointer; }
    button:hover { background: #1e8449; }
    .result { margin-top: 25px; }
    .error { color: red; margin-top: 15px; }
    .loading { color: #2f80ed; margin-top: 15px; }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">
    // FIXED: Using Open-Meteo API (NO API KEY REQUIRED!)
    const fetchWeather = async (city) => {
      try {
        // First, geocode the city name to get coordinates
        const geocodeResponse = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${city}&count=1&language=en&format=json`);
        const geocodeData = await geocodeResponse.json();
        
        if (!geocodeData.results || geocodeData.results.length === 0) {
          return { error: "City not found. Please check the city name." };
        }
        
        const { latitude, longitude, name, country } = geocodeData.results[0];
        
        // Then fetch weather data using coordinates
        const weatherResponse = await fetch(
          `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current_weather=true&hourly=temperature_2m,relative_humidity_2m,windspeed_10m&timezone=auto`
        );
        const weatherData = await weatherResponse.json();
        
        // Format the data to match what Dashboard expects
        return {
          name: name,
          country: country,
          current_weather: weatherData.current_weather,
          hourly: weatherData.hourly
        };
      } catch (error) {
        return { error: "Network error. Please try again." };
      }
    };

    const Header = () => (
      <div className="header">
        <h1>🌤️ Weather Dashboard</h1>
      </div>
    );

    const Search = ({ city, setCity, onSearch, loading }) => (
      <div>
        <input 
          type="text" 
          value={city} 
          onChange={(e) => setCity(e.target.value)} 
          placeholder="Enter city name (e.g., London, New York, Tokyo)" 
          onKeyPress={(e) => e.key === 'Enter' && onSearch()}
        />
        <button onClick={onSearch} disabled={loading}>
          {loading ? "Searching..." : "Search"}
        </button>
      </div>
    );

    const Dashboard = ({ weather, error }) => {
      if (error) return <p className="error">❌ {error}</p>;
      if (!weather) return null;

      return (
        <div className="result">
          <h2>📍 {weather.name}, {weather.country}</h2>
          <p>🌡️ Temperature: {Math.round(weather.current_weather?.temperature)} °C</p>
          <p>💨 Wind Speed: {weather.current_weather?.windspeed} km/h</p>
          <p>🔄 Wind Direction: {weather.current_weather?.winddirection}°</p>
          <p>🆔 Weather Code: {weather.current_weather?.weathercode}</p>
          <small>Data from Open-Meteo.com</small>
        </div>
      );
    };

    const App = () => {
      const [city, setCity] = React.useState("");
      const [weather, setWeather] = React.useState(null);
      const [error, setError] = React.useState("");
      const [loading, setLoading] = React.useState(false);

      const handleSearch = async () => {
        if (!city.trim()) {
          setError("Please enter a city name");
          setWeather(null);
          return;
        }
        
        setLoading(true);
        setError("");
        
        const data = await fetchWeather(city);
        
        if (data.error) {
          setError(data.error);
          setWeather(null);
        } else {
          setWeather(data);
          setError("");
        }
        
        setLoading(false);
      };

      return (
        <div>
          <Header />
          <div className="container">
            <Search 
              city={city} 
              setCity={setCity} 
              onSearch={handleSearch}
              loading={loading}
            />
            {loading && <p className="loading">Loading weather data...</p>}
            <Dashboard weather={weather} error={error} />
            <p>
              REG NO: 24BCE2038 <br/>
              NAME: GURUPAVAN KUMAR
            </p>
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
